name: Auto Update

on:
  schedule:
    - cron: '0 19 * * *' # Beijing 03:00 (UTC+8) is 19:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dependencies:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@main
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0
          persist-credentials: false

      - name: Install Nix
        uses: cachix/install-nix-action@master
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Install npins
        run: nix-env -f '<nixpkgs>' -iA npins

      - name: Update npins
        run: |
          cd tests
          npins update

      - name: Update flake.lock
        run: nix flake update --extra-experimental-features "nix-command flakes"

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PAT }}
          commit-message: "chore: update dependencies"
          title: "chore: update dependencies"
          body: "This PR updates both npins and flake dependencies automatically via the scheduled workflow."
          branch: "auto-update-deps"
          delete-branch: true
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>

      - name: Enable Auto Merge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          gh pr merge --auto --merge "${{ steps.cpr.outputs.pull-request-number }}"
